<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rak Maya Digital Geliga Lestari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2980b9;
            --secondary-color: #3498db;
            --accent-color: #f1c40f;
            --bg-color: #ecf0f1;
            --text-color: #34495e;
            --card-bg: #ffffff;
            --card-hover: #e0f7fa;
        }

        body {
            font-family: 'Baloo 2', cursive;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            color: var(--primary-color);
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .header img {
            max-width: 150px;
            height: auto;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        #story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
            background-color: #bdc3c7;
            border-radius: 15px;
        }

        .story-card {
            background-color: var(--card-bg);
            border: 2px solid var(--secondary-color);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 120px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .story-card:hover {
            transform: translateY(-5px);
            background-color: var(--card-hover);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .story-card .emoji {
            font-size: 2.5em;
        }

        .story-card .title {
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 10px;
        }

        #story-display-area {
            margin-top: 30px;
            padding: 30px;
            background-color: var(--card-bg);
            border-radius: 15px;
            text-align: left;
            font-size: 1.5em;
            line-height: 1.8;
            min-height: 200px;
            display: none; /* Hidden by default */
            border: 3px solid var(--primary-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        #story-content p {
            margin-bottom: 1.5em;
        }
        
        #story-content .moral {
            font-weight: bold;
            color: #c0392b;
            margin-top: 20px;
            padding: 15px;
            background-color: #f9e4e2;
            border-left: 5px solid #c0392b;
            border-radius: 5px;
        }
        
        #story-content span {
            cursor: pointer;
            transition: background-color 0.3s;
            padding: 2px 0;
            border-radius: 3px;
        }
        
        #story-content span:hover {
            background-color: var(--accent-color);
            color: white;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .translate-btn {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-family: 'Baloo 2', cursive;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            font-weight: bold;
        }

        .translate-btn:hover {
            background-color: #f39c12;
            transform: scale(1.05);
        }
        
        footer {
            margin-top: 40px;
            padding: 20px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border-radius: 10px;
            font-size: 0.9em;
        }

        footer p {
            margin: 5px 0;
        }

        #uptime-counter {
            font-weight: bold;
            color: var(--accent-color);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            #story-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            .story-card {
                padding: 10px;
                height: 100px;
            }
            .story-card .emoji {
                font-size: 2em;
            }
            .story-card .title {
                font-size: 1em;
            }
            #story-display-area {
                font-size: 1.2em;
            }
            .translate-btn {
                font-size: 1em;
                padding: 12px 25px;
            }
        }
    </style>
</head>

                content_ms: {
                    story: `Di tepi sungai, tinggal seekor monyet 🐒 yang sangat tamak. Suatu hari, dia terjumpa sebuah balang kaca yang penuh dengan kacang. Monyet itu sangat gembira 🤩. Dia memasukkan tangannya ke dalam balang dan menggenggam sebanyak mungkin kacang. Dia cuba menarik tangannya keluar, tetapi gagal kerana genggamannya terlalu besar untuk muat melalui mulut balang yang sempit.

                content_en: {
                    story: `On a very hot day ☀️, a crow was very thirsty. He flew here and there searching for water, but all the rivers and ponds had dried up. Finally, he saw a tall pitcher of water in the yard of a house. Happily, the crow flew towards the pitcher. However, he was disappointed to find that the water inside was very little and his beak could not reach it.

The crow worked diligently without getting tired. After dropping in many pebbles, the water level finally rose high enough for him to drink. The crow drank the water to his heart's content and quenched his thirst. He was very happy because his effort had paid off. He learned that with intelligence and effort, difficult problems can be overcome.`,

                    story: `Pada musim panas yang ceria, seekor belalang menghabiskan masanya dengan menyanyi 🎶 dan menari. Dia melihat sekumpulan semut bekerja keras mengumpul makanan. "Kenapa kamu semua bekerja keras? Mari bergembira denganku!" ejek belalang. Seekor semut menjawab, "Kami sedang menyimpan makanan untuk musim sejuk ❄️. Kamu juga patut berbuat begitu." Belalang itu hanya ketawa dan tidak mengendahkan nasihat semut.

                    story: `During a cheerful summer, a grasshopper spent his time singing 🎶 and dancing. He saw a group of ants working hard to collect food. "Why are you all working so hard? Come and have fun with me!" mocked the grasshopper. An ant replied, "We are storing food for the winter ❄️. You should do the same." The grasshopper just laughed and ignored the ant's advice.

Dengan rasa rendah diri, dia menghampiri burung-burung itu. Dia menundukkan kepala ke air dan terkejut melihat bayangnya sendiri. Dia bukan lagi seekor anak itik kelabu yang hodoh, tetapi telah bertukar menjadi seekor angsa putih yang anggun 🦢, sama seperti burung-burung di hadapannya. Burung-burung lain menyambutnya dengan gembira. Akhirnya, dia menemui keluarganya dan diterima seadanya.`,

                content_en: {
                    story: `On a farm, a mother duck 🦆 was hatching her eggs. When the eggs hatched, out came cute little ducklings. But, there was one duckling that looked different. Its body was bigger, its color was gray, and it wasn't as pretty as its siblings. All the animals on the farm teased it, "You are ugly!". The little duckling felt very sad and lonely.

                    story: `Ada seorang budak lelaki penggembala biri-biri 🐑. Setiap hari, dia membawa biri-birinya ke padang rumput. Kerana berasa bosan, dia mendapat idea untuk bergurau. Dia berlari ke arah kampung sambil menjerit, "Tolong! Ada serigala! Serigala menyerang biri-biri saya!" Orang kampung segera berlari membawa kayu dan cangkul untuk membantunya. Tetapi apabila tiba, mereka tidak melihat serigala pun. Budak itu hanya ketawa 😆.

            {

        document.addEventListener('DOMContentLoaded', () => {
            const storyGrid = document.getElementById('story-grid');
            const storyDisplayArea = document.getElementById('story-display-area');
            const storyContent = document.getElementById('story-content');
            const translateBtn = document.getElementById('translate-btn');

            // Populate story cards
            stories.forEach(story => {
                const card = document.createElement('div');
                card.className = 'story-card';
                card.dataset.storyId = story.id;
                card.innerHTML = `
                    <div class="emoji">${story.emoji}</div>
                    <div class="title">${story.title}</div>
                `;
                card.addEventListener('click', () => {
                    displayStory(story.id, 'ms');
                });
                storyGrid.appendChild(card);
            });

            // Word-by-word speech functionality
            storyContent.addEventListener('click', (e) => {
                if (e.target.tagName === 'SPAN') {
                    const word = e.target.textContent.replace(/[.,!?;:(){}[\]]/g, '').trim();
                    if (word) {
                        const lang = storyContent.dataset.lang;
                        speak(word, lang);
                    }
                }
            });
            
            // Translate button functionality
            translateBtn.addEventListener('click', () => {
                const storyId = translateBtn.dataset.storyId;
                const currentLang = translateBtn.dataset.currentLang;
                const newLang = currentLang === 'ms' ? 'en' : 'ms';
                displayStory(storyId, newLang);
            });

            // Uptime counter
            const uptimeCounter = document.getElementById('uptime-counter');
            // Tetapkan tarikh mula operasi sistem
            const startTime = new Date('2025-07-02T00:00:00');

            function updateUptime() {
                const now = new Date();
                // Kira perbezaan masa. Jika sekarang belum 2 Julai 2025, tunjuk 0.
                const diff = Math.max(0, now - startTime);

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                uptimeCounter.textContent = 
                    `${days} hari, ${hours} jam, ${minutes} minit, ${seconds} saat`;
            }
            setInterval(updateUptime, 1000);
            updateUptime(); // Run once immediately

            function displayStory(storyId, lang) {
                const storyData = stories.find(s => s.id == storyId);
                if (!storyData) return;

                const content = (lang === 'ms') ? storyData.content_ms : storyData.content_en;
                
                // Wrap each word in a span for click-to-speak
                const storyHtml = content.story.split(/(\s+)/).map(word => `<span>${word}</span>`).join('');

                storyContent.innerHTML = `
                    ${storyHtml}
                    <p class="moral">${content.moral}</p>
                `;
                
                storyContent.dataset.lang = lang;
                storyDisplayArea.style.display = 'block';
                
                // Update translate button
                translateBtn.dataset.storyId = storyId;
                translateBtn.dataset.currentLang = lang;
                if (lang === 'ms') {
                    translateBtn.textContent = 'Translate to English 🇬🇧';
                } else {
                    translateBtn.textContent = 'Terjemah ke Bahasa Melayu 🇲🇾';
                }
                
                // Scroll to the story
                storyDisplayArea.scrollIntoView({ behavior: 'smooth' });
            }

            function speak(text, lang) {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    if (lang === 'ms') {
                        utterance.lang = 'ms-MY';
                    } else {
                        utterance.lang = 'en-US';
                    }
                    utterance.rate = 0.9;
                    window.speechSynthesis.cancel(); // Cancel any previous speech
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert('Maaf, pelayar web anda tidak menyokong fungsi sebutan suara.');
                }
            }
        });
    </script>
